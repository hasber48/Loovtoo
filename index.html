<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Test your knowledge of world capitals and country flags">
  <link rel="stylesheet" href="./styles.css"/>
  <title>Geo Quiz</title>
</head>
<body>
  <!-- START SCREEN -->
  <div id="startScreen">
    <h1>Geo Quiz</h1>
    <button id="startButton">Start</button>
  </div>
  <!-- GAME SELECTION SCREEN -->
  <div id="gameSelectionScreen" class="hidden">
    <h2>Select Quiz Pack</h2>
    <div id="packGrid" class="grid">
      <div class="pack-item" data-pack="capitals-europe">Europe - Capitals</div>
      <div class="pack-item" data-pack="capitals-asia">Asia - Capitals</div>
      <div class="pack-item" data-pack="capitals-americas">Americas - Capitals</div>
      <div class="pack-item" data-pack="capitals-africa">Africa - Capitals</div>
      <div class="pack-item" data-pack="flags-europe">Europe - Flags</div>
      <div class="pack-item" data-pack="flags-asia">Asia - Flags</div>
      <div class="pack-item" data-pack="flags-americas">Americas - Flags</div>
      <div class="pack-item" data-pack="flags-africa">Africa - Flags</div>
    </div>
    <button id="backButton1">Back</button>
  </div>
  <!-- GAME SCREEN -->
  <div id="gameScreen" class="hidden">
    <div id="scoreBlock">
      Score: <span id="scoreSpan">0</span>
    </div>
    <div id="questionBlock">
      <img id="questionImg" src="" alt="Quiz image">
      <p id="questionText"></p>
      <div id="answerBlock" class="grid">
        <div id="answerA" class="item"></div>
        <div id="answerB" class="item"></div>
        <div id="answerC" class="item"></div>
        <div id="answerD" class="item"></div>
      </div>
      <button id="nextButton" style="visibility: hidden;">Next Question</button>
    </div>
    <button id="backButton2">Back to Selection</button>
  </div>
  <!-- GAME OVER SCREEN -->
  <div id="gameOverScreen" class="hidden">
    <h2>Game Over!</h2>
    <p>Your final score is: <span id="finalScoreSpan">0</span></p>
    <button id="restartButton">Restart</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
