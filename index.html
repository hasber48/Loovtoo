<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles.css"/>
  <title>Geo Quiz</title>
</head>
<body>
  <div id="startScreen">
    <h1>Geo Quiz</h1>
    <button id="startButton">Start</button>
  </div>
  <div id="gameScreen" style="display: none;">
    <div id="scoreBlock">
      Score: <span id="scoreSpan">0</span>
    </div>
    <div id="questionBlock">
      <img src="https://www.amigo-s.ru/content-images/6f7601ae9f1d6231d7f3fb9fc86feca1.jpg">
      <p class="questionText">What is the capital of Hungary?</p>
      <div id="answerBlock" class="grid">
        <div id="answerA" class="item">Paris</div>
        <div id="answerB" class="item">Tallinn</div>
        <div id="answerC" class="item">Budapest</div>
        <div id="answerD" class="item">Wien</div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
